<h2>Personal Task Management</h2>


<button (click)="logout()">Logout</button>

<br><br>

<input [(ngModel)]="newTask" placeholder="Enter task">
<button (click)="addTask()">Add task</button>

<ul>
 <li *ngFor="let task of tasks">
  
  <span [class.completed]="task.completed">
    {{ task.title }}
  </span>

  <div class="actions">
    <button class="complete" (click)="completeTask(task.id)">Completed task</button>
    <button class="delete" (click)="deleteTask(task.id)">Remove task</button>
  </div>

</li>
</ul>
