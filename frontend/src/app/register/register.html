<div class="container">
  <h2>Register</h2>

  <input [(ngModel)]="user.username" placeholder="Username">
  <input [(ngModel)]="user.password" type="password" placeholder="Password">

  <button (click)="register()">Register</button>

  <p>
    Already have an account?
    <a routerLink="/">Login</a>
  </p>
</div>
